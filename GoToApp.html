<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正在进入开奖大师...</title>
    <style>
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f5f5f5;
        }
        .container {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #141414;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h1 { color: #333; font-size: 24px; }
        p { color: #666; }
        a { color: #141414; text-decoration: none; font-weight: bold; }
        a:hover { text-decoration: underline; }
    </style>
    <script>
        // 自动跳转到本地服务器
        setTimeout(function() {
            window.location.href = "http://localhost:3000";
        }, 1000);
    </script>
</head>
<body>
    <div class="container">
        <h1>开奖大师 - 全自动投注系统</h1>
        <div class="loader"></div>
        <p>正在连接本地服务器，请稍候...</p>
        <p>如果长时间未跳转，请点击：<a href="http://localhost:3000">手动进入程序</a></p>
        <p style="font-size: 12px; margin-top: 20px; color: #999;">提示：请确保已运行“一键启动.bat”且黑窗口未关闭。</p>
    </div>
</body>
</html>
